{{- if .Values.init.enabled }}
# ServiceAccount + ClusterRole + ClusterRoleBinding for the planectl-init Job.
# The init job needs to create/update Secrets (runner token, ArgoCD repo) and
# Application CRs (ArgoCD) across potentially multiple namespaces.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: planectl-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: planectl-init-{{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: planectl-init-{{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: planectl-init-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: planectl-init
    namespace: {{ .Release.Namespace }}
{{- end }}
