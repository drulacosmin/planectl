{{- if and .Values.aws.enabled .Values.crossplane.enabled }}
# AWS credentials Secret and Crossplane ProviderConfig.
# The Secret is referenced by the init job (env var injection) and by Crossplane.
---
apiVersion: v1
kind: Secret
metadata:
  name: planectl-aws-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
type: Opaque
stringData:
  accessKeyId: {{ .Values.aws.accessKeyId | quote }}
  secretAccessKey: {{ .Values.aws.secretAccessKey | quote }}
  credentials: |
    [default]
    aws_access_key_id = {{ .Values.aws.accessKeyId }}
    aws_secret_access_key = {{ .Values.aws.secretAccessKey }}
---
# ProviderConfig tells Crossplane where to find the AWS credentials.
# Applied immediately; Crossplane retries until the providers are healthy.
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: {{ .Release.Namespace }}
      name: planectl-aws-credentials
      key: credentials
{{- end }}
