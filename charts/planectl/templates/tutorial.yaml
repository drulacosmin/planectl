{{- if .Values.tutorial.enabled }}
---
# ConfigMap — embed server.js, index.html, package.json from files/tutorial/
apiVersion: v1
kind: ConfigMap
metadata:
  name: planectl-tutorial
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
data:
  package.json: |
{{ .Files.Get "files/tutorial/package.json" | indent 4 }}
  server.js: |
{{ .Files.Get "files/tutorial/server.js" | indent 4 }}
  index.html: |
{{ .Files.Get "files/tutorial/index.html" | indent 4 }}
{{- if .Values.init.kubeconfigB64 }}
---
# Secret — kubeconfig for kubectl inside the tutorial terminal
apiVersion: v1
kind: Secret
metadata:
  name: planectl-kubeconfig
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
type: Opaque
data:
  config: {{ .Values.init.kubeconfigB64 }}
{{- end }}
---
# Deployment — initContainer installs npm deps + kubectl, main container runs the app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planectl-tutorial
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
    app.kubernetes.io/component: tutorial
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: planectl-tutorial
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: planectl-tutorial
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: npm-install
          image: node:20
          command:
            - /bin/sh
            - -c
            - |
              set -e
              cp /config/package.json /app/
              cp /config/server.js    /app/
              cp /config/index.html   /app/
              cd /app && npm install 2>&1
              # Download kubectl into /app so the main container's PATH finds it
              KUBECTL_VER=$(curl -sSL https://dl.k8s.io/release/stable.txt)
              curl -sSLo /app/kubectl \
                "https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/amd64/kubectl"
              chmod +x /app/kubectl
          volumeMounts:
            - name: config
              mountPath: /config
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      containers:
        - name: tutorial
          image: node:20
          # 1. Symlink kubectl so all shell types find it (login shells reset PATH).
          # 2. Copy kubeconfig to a writable path and fix the API server hostname:
          #    Docker Desktop's TLS cert covers kubernetes.docker.internal, NOT host.docker.internal.
          command:
            - sh
            - -c
            - |
              ln -sf /app/kubectl /usr/local/bin/kubectl
              cp /kube/config /tmp/kubeconfig
              sed -i 's|https://host.docker.internal:|https://kubernetes.docker.internal:|g' /tmp/kubeconfig
              exec env KUBECONFIG=/tmp/kubeconfig node /app/server.js
          env:
            - name: PORT
              value: {{ .Values.tutorial.port | quote }}
            - name: CONTROL_PLANE_HOST
              value: {{ .Values.host | quote }}
            - name: GITEA_PORT
              value: "30080"
            - name: ARGOCD_PORT
              value: "8080"
            - name: DEMO_REPO
              value: "admin/demo-repo"
            - name: SHELL_CMD
              value: "/bin/bash --login"
            {{- if .Values.init.kubeconfigB64 }}
            # Startup script copies /kube/config to /tmp/kubeconfig and patches the server URL.
            # KUBECONFIG is set to /tmp/kubeconfig via exec env in the startup command above.
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.tutorial.port }}
              protocol: TCP
          volumeMounts:
            - name: app
              mountPath: /app
            {{- if .Values.init.kubeconfigB64 }}
            - name: kubeconfig
              mountPath: /kube
              readOnly: true
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.tutorial.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: planectl-tutorial
        - name: app
          emptyDir: {}
        {{- if .Values.init.kubeconfigB64 }}
        - name: kubeconfig
          secret:
            secretName: planectl-kubeconfig
        {{- end }}
---
# Service — LoadBalancer so docker-desktop exposes it directly on localhost:4000
apiVersion: v1
kind: Service
metadata:
  name: planectl-tutorial
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
    app.kubernetes.io/component: tutorial
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: planectl-tutorial
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.tutorial.port }}
      targetPort: {{ .Values.tutorial.port }}
      protocol: TCP
{{- end }}
