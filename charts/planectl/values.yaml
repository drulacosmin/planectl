# planectl — default values
# Override with --set key=value or -f custom-values.yaml

# ── Host ────────────────────────────────────────────────────────────────────────
# Hostname used for browser-facing URLs (NOTES output, tutorial links).
# localhost works on Docker Desktop (NodePort + LoadBalancer both bind to localhost).
# On AWS/remote: set to the server's public IP or hostname.
host: localhost

# ── Init Job ────────────────────────────────────────────────────────────────────
# The post-install hook that wires everything together.
init:
  enabled: true
  # base64-encoded kubeconfig injected as a Secret into the tutorial pod.
  # The tutorial startup patches the server URL automatically, so the sed below
  # only needs to replace 127.0.0.1. kubernetes.docker.internal is in the TLS cert SANs.
  # Generate with:
  #   kubectl config view --minify --flatten \
  #     | sed 's|127.0.0.1|kubernetes.docker.internal|g' \
  #     | base64
  kubeconfigB64: ""

# ── AWS (optional) ──────────────────────────────────────────────────────────────
# Set enabled: true and provide credentials to install Crossplane AWS providers.
aws:
  enabled: false
  accessKeyId: ""
  secretAccessKey: ""
  region: eu-west-1

# ── Gitea Actions Runner ─────────────────────────────────────────────────────────
runner:
  enabled: true
  dockerSocket: /var/run/docker.sock
  # URL the runner uses to reach Gitea from *inside* Docker containers on the host.
  # Docker containers cannot use "localhost" — they need the host's bridge address.
  # Docker Desktop: host.docker.internal  |  AWS EC2/k3s: set to the EC2 private IP
  giteaHost: host.docker.internal

# ── Gitea subchart ───────────────────────────────────────────────────────────────
# Passes values directly to the gitea/gitea chart.
# Ref: https://gitea.com/gitea/helm-chart
gitea:
  enabled: true
  gitea:
    admin:
      username: admin
      password: admin123
      email: admin@example.com
    config:
      actions:
        ENABLED: "true"
        DEFAULT_ACTIONS_URL: github
      server:
        ROOT_URL: http://localhost:30080
  service:
    http:
      type: NodePort
      nodePort: 30080
  persistence:
    size: 5Gi
  metrics:
    enabled: false
  postgresql-ha:
    enabled: false
  postgresql:
    enabled: true
    primary:
      persistence:
        size: 2Gi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
  valkey-cluster:
    enabled: false
  valkey:
    enabled: true
    primary:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── ArgoCD subchart ──────────────────────────────────────────────────────────────
# Ref: https://artifacthub.io/packages/helm/argo/argo-cd
argo-cd:
  enabled: true
  configs:
    params:
      server.insecure: true
  dex:
    enabled: false
  notifications:
    enabled: false
  applicationSet:
    enabled: false
  server:
    service:
      type: LoadBalancer
      servicePortHttp: 8080
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
  repoServer:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  controller:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  redis:
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

# ── Crossplane subchart ───────────────────────────────────────────────────────────
# Ref: https://artifacthub.io/packages/helm/crossplane/crossplane
crossplane:
  enabled: true
  resourcesCrossplane:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  resourcesRBACManager:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ── Tutorial ─────────────────────────────────────────────────────────────────────
# Interactive GitOps workshop UI with embedded terminal (node-pty + xterm.js)
# Accessible at http://localhost:4000 (LoadBalancer)
tutorial:
  enabled: true
  port: 4000

# ── Pulumi Kubernetes Operator subchart ───────────────────────────────────────────
# Ref: https://github.com/pulumi/pulumi-kubernetes-operator
pulumi-kubernetes-operator:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi
